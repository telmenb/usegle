<!doctype html>
<html lang="mn">

<head>
	<meta charset="utf-8" />
	<link rel="icon" href="%sveltekit.assets%/favicon.png" />
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

	<!-- PWA and mobile meta tags -->
	<link rel="manifest" href="%sveltekit.assets%/manifest.json" />
	<meta name="theme-color" content="#a8b87a" />
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-status-bar-style" content="default" />
	<meta name="apple-mobile-web-app-title" content="Usegle" />
	<link rel="apple-touch-icon" href="%sveltekit.assets%/favicon.png" />

	<!-- Prevent zoom on orientation change -->
	<meta name="mobile-web-app-capable" content="yes" />

	<script>
		// Add dark mode class if preference exists
		(function () {
			try {
				const darkModeValue = localStorage.getItem('darkMode');
				if (darkModeValue === 'true' ||
					(darkModeValue === null && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
					document.documentElement.classList.add('dark');
				}
			} catch (e) {
				// Do nothing
			}
		})();
	</script>
	%sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover">
	<div style="display: contents">%sveltekit.body%</div>
</body>

</html>
